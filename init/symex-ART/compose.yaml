services:
  bootstrap:
    image: alpine/git:2.49.1
    init: true
    working_dir: /workspace/work_SE
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - |
        set -e
        if [ ! -d /workspace/work_SE/.git ]; then
          echo "==> Cloning work_SE"
          git clone https://github.com/LeisureGensoul/work_SE.git /workspace/work_SE
        fi
        echo "==> Syncing submodule URLs"
        git -C /workspace/work_SE submodule sync
        echo "==> Updating submodules"
        for attempt in 1 2 3; do
          if git -C /workspace/work_SE submodule update --init --jobs 1; then
            break
          fi
          if [ "$$attempt" -eq 3 ]; then
            echo "Submodule update failed after 3 attempts."
            exit 1
          fi
          echo "Submodule update failed. Retrying ($$((attempt + 1))/3) ..."
          sleep 3
        done
    volumes:
      - work:/workspace/work_SE

volumes:
  work:
    name: symex-art-work
