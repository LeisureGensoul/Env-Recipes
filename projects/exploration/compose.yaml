services:
  dev:
    build:
      context: .
      args:
        INSTALL_CODEX: "true"
    image: exploration-dev
    init: true
    stdin_open: true
    tty: true
    working_dir: /workspace/exploration
    command: bash
    environment:
      CODEX_HOME: /root/.codex
      COLORTERM: truecolor
      EDITOR: vim
      TERM: xterm-256color
      VISUAL: vim
    volumes:
      - work:/workspace/exploration

volumes:
  work:
    name: exploration-work
